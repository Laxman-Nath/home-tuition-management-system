<nav
  class="fixed top-0 w-full z-50 transition-all duration-300"
  [ngClass]="{
    'bg-white/70 backdrop-blur-lg border-b border-slate-200 py-3 shadow-sm':
      isScrolled,
    'bg-transparent py-5 border-transparent': !isScrolled
  }"
>
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
    <!-- LOGO -->
    <a routerLink="/" class="flex items-center gap-2">
      <app-logo class="w-8 h-8 text-indigo-600"></app-logo>
     
    </a>

    <!-- DESKTOP NAV LINKS -->
    <div class="hidden md:flex items-center gap-8">
      <a
        *ngFor="let link of navLinks"
        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors cursor-pointer"
        (click)="scrollToSection(link.id)"
      >
        {{ link.name }}
      </a>
    </div>

    <!-- DESKTOP BUTTONS -->
    <div class="hidden md:flex items-center gap-3">
      <button
        mat-stroked-button
        color="primary"
        routerLink="/login"
        class="rounded-full px-6"
      >
        Login
      </button>
      <button
        mat-raised-button
        color="primary"
        routerLink="/signup"
        class="rounded-full px-6 shadow-lg"
      >
        Sign Up
      </button>
    </div>

    <!-- MOBILE MENU -->
    <div class="md:hidden">
      <button
        mat-icon-button
        (click)="sidenav.toggle()"
        class="rounded-xl"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <mat-sidenav-container class="absolute top-0 right-0 w-full h-screen z-50">
        <mat-sidenav #sidenav mode="over" position="end" class="w-64 bg-white p-6">
          <!-- Mobile nav links -->
          <div class="flex flex-col gap-6 mt-12">
            <a
              *ngFor="let link of navLinks"
              (click)="sidenav.close(); scrollToSection(link.id)"
              class="text-lg font-semibold text-black text-center hover:text-indigo-600 transition-colors border-b border-slate-50 pb-2 cursor-pointer"
            >
              {{ link.name }}
            </a>
          </div>

          <div class="flex flex-col gap-4 mt-12">
            <button mat-stroked-button color="primary" routerLink="/login" class="w-full h-12 rounded-xl">
              Login
            </button>
            <button mat-raised-button color="primary" routerLink="/signup" class="w-full h-12 rounded-xl">
              Sign Up
            </button>
          </div>
        </mat-sidenav>
      </mat-sidenav-container>
    </div>
  </div>
</nav>
