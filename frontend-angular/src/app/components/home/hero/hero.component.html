<section class="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden bg-slate-50" id="hero">
  <!-- Floating blobs -->
  <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
  <div class="absolute top-0 -right-4 w-72 h-72 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse delay-2000"></div>
  <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse delay-4000"></div>

  <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
    <!-- Left text -->
    <div [@fadeIn] class="space-y-8">
      <span class="inline-block bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full font-medium">
        ✨ Next-Gen Management
      </span>

      <h1 class="text-5xl md:text-7xl font-bold tracking-tight leading-[1.1]">
        Manage Your <span class="text-indigo-600">Tuition</span> Business Like a Pro.
      </h1>

      <p class="text-lg text-slate-500 max-w-lg leading-relaxed">
        Automate scheduling, track student progress, and manage fees—all in one beautiful dashboard designed for modern educators.
      </p>

      <div class="flex flex-col sm:flex-row gap-4">
        <button mat-raised-button color="primary" class="h-14 px-8 text-lg rounded-2xl bg-indigo-600 shadow-xl hover:bg-indigo-700">
          Get Started Free
        </button>
        <button mat-stroked-button color="primary" class="h-14 px-8 text-lg rounded-2xl">
          Learn More
        </button>
      </div>
    </div>

    <!-- Right image -->
    <div [@scaleIn] class="relative">
      <div class="relative z-10 bg-white/40 backdrop-blur-sm p-4 rounded-3xl border border-white/20 shadow-2xl">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=800" 
             alt="Tuition Dashboard" class="rounded-2xl" />
      </div>
      <div class="absolute -bottom-6 -left-6 z-20 bg-white p-6 rounded-2xl shadow-xl border border-slate-100 flex items-center gap-4 animate-bounce">
        <div class="bg-green-100 p-3 rounded-full">
          <span class="text-green-600 w-6 h-6 material-icons">trending_up</span>
        </div>
        <div>
          <p class="text-sm text-slate-500 font-medium">Fee Collection</p>
          <p class="text-xl font-bold">+92% efficient</p>
        </div>
      </div>
    </div>
  </div>
</section>
