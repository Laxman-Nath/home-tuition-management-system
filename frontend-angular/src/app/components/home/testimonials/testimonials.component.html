<section id="testimonials" class="py-20 md:py-28 bg-gradient-to-b from-white to-slate-50">

  <!-- Section Header -->
  <div class="max-w-7xl mx-auto px-6 text-center mb-16">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-slate-900 mb-4">
      Loved by innovators
    </h2>
    <p class="text-slate-500 max-w-2xl text-center mx-auto">
      Hear what parents, tutors, and students have to say about TutorFlow.
    </p>
  </div>

  <!-- Testimonials Grid -->
  <div class="max-w-7xl mx-auto px-6 grid gap-8 md:grid-cols-3">
    <div *ngFor="let t of testimonials" 
         class="border border-slate-200 bg-white shadow-md 
                hover:shadow-2xl hover:-translate-y-1 
                transition-all duration-300 rounded-2xl flex flex-col p-8">

      <!-- Stars -->
      <div class="flex justify-center gap-1 mb-4">
        <ng-container *ngFor="let star of [1,2,3,4,5]">
          <svg class="w-4 h-4 text-amber-400 fill-current" viewBox="0 0 24 24">
            <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.914 1.428 8.32-7.364-3.868-7.364 3.868 1.428-8.32-6.064-5.914 8.332-1.151z"/>
          </svg>
        </ng-container>
      </div>

      <!-- Quote -->
      <p class="text-sm text-slate-600 italic text-center leading-relaxed mb-6">
        "{{ t.quote }}"
      </p>

      <!-- Footer -->
      <div class="flex items-center gap-3 mt-auto pt-6 border-t border-slate-100">
        <img [src]="t.avatar" alt="{{ t.name }}" class="h-10 w-10 rounded-full"/>
        <div>
          <p class="text-sm font-semibold text-slate-900">{{ t.name }}</p>
          <p class="text-xs text-slate-500">{{ t.role }}</p>
        </div>
      </div>

    </div>
  </div>

</section>
